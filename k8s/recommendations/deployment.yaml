apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendations-api
  namespace: recommendations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendations-api
  template:
    metadata:
      labels:
        app: recommendations-api
    spec:
      containers:
      - name: recommendations-api
        image: 388691194728.dkr.ecr.us-east-1.amazonaws.com/recommendations-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: ENDPOINT_NAME
          value: "recommendations-endpoint-v1"
        - name: AWS_REGION
          value: "us-east-2"
        - name: TEAM_NAME
          value: "recommendations"
        volumeMounts:
        - name: aws-credentials
          mountPath: /root/.aws
          readOnly: true
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: aws-credentials
        secret:
          secretName: aws-credentials